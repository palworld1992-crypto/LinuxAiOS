syntax = "proto3";

package master;

service MasterService {
    rpc SubmitProposal(ProposalRequest) returns (ProposalResponse);
    rpc SubmitVote(VoteRequest) returns (VoteResponse);
    rpc RegisterSupervisor(RegisterRequest) returns (RegisterResponse);
    rpc GetLedger(GetLedgerRequest) returns (GetLedgerResponse);
}

service RaftService {
    rpc AppendEntries(AppendEntriesRequest) returns (AppendEntriesResponse);
    rpc Vote(RaftVoteRequest) returns (RaftVoteResponse);
    rpc InstallSnapshot(InstallSnapshotRequest) returns (InstallSnapshotResponse);
}

// --- Supervisor messages (encrypted payload) ---
message ProposalRequest {
    bytes data = 1;  // encrypted proposal (Transaction + signature)
}

message ProposalResponse {
    bool accepted = 1;
    string message = 2;
}

message VoteRequest {
    bytes data = 1;  // encrypted vote (Vote struct)
}

message VoteResponse {
    bool success = 1;
}

message RegisterRequest {
    int32 supervisor_type = 1;  // 1=Linux, 2=Windows, 3=Android, 4=SIH, 5=SystemHost, 6=Browser, 7=Adaptive
}

message RegisterResponse {
    uint64 supervisor_id = 1;
    bytes kyber_private_key = 2;        // 2400 bytes
    bytes dilithium_private_key = 3;    // 4032 bytes
    bytes master_kyber_public = 4;      // 1568 bytes (Master Tunnel's Kyber public key)
    bytes master_dilithium_public = 5;  // 1952 bytes (Master Tunnel's Dilithium public key)
}

message GetLedgerRequest {
    // optional height/hash
}

message GetLedgerResponse {
    bytes block_data = 1;  // serialized ledger
}

// --- Raft internal messages (used between Master Tunnel nodes) ---
message AppendEntriesRequest {
    uint64 term = 1;
    uint64 leader_id = 2;
    uint64 prev_log_index = 3;
    uint64 prev_log_term = 4;
    repeated Entry entries = 5;
    uint64 leader_commit = 6;
}

message Entry {
    uint64 index = 1;
    uint64 term = 2;
    bytes data = 3;
}

message AppendEntriesResponse {
    uint64 term = 1;
    bool success = 2;
    uint64 last_log_index = 3;
}

message RaftVoteRequest {
    uint64 term = 1;
    uint64 candidate_id = 2;
    uint64 last_log_index = 3;
    uint64 last_log_term = 4;
}

message RaftVoteResponse {
    uint64 term = 1;
    bool vote_granted = 2;
}

message InstallSnapshotRequest {
    uint64 term = 1;
    uint64 leader_id = 2;
    uint64 last_included_index = 3;
    uint64 last_included_term = 4;
    uint64 offset = 5;
    bytes data = 6;
    bool done = 7;
}

message InstallSnapshotResponse {
    uint64 term = 1;
}